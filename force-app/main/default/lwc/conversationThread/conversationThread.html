<template>
    <div class="thread-container slds-card">
        <!-- Thread header -->
        <div class="thread-header slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                    <lightning-icon icon-name={platformIcon} size="small"></lightning-icon>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title slds-truncate">
                        {contactName} &mdash; {platform}
                    </h2>
                    <p class="slds-text-body_small slds-text-color_weak">Case #{caseNumber}</p>
                </div>
            </header>
            <div class="slds-no-flex">
                <lightning-button-group>
                    <lightning-button
                        label="Refresh"
                        icon-name="utility:refresh"
                        onclick={handleRefresh}>
                    </lightning-button>
                    <lightning-button
                        label="Close Conversation"
                        icon-name="utility:close"
                        variant="destructive-text"
                        onclick={handleClose}>
                    </lightning-button>
                </lightning-button-group>
            </div>
        </div>

        <!-- Message thread -->
        <div class="slds-card__body thread-body" lwc:ref="threadBody">
            <template if:true={isLoadingMessages}>
                <lightning-spinner alternative-text="Loading messages" size="medium">
                </lightning-spinner>
            </template>

            <template if:false={isLoadingMessages}>
                <template if:true={hasMessages}>
                    <template for:each={messages} for:item="msg">
                        <div key={msg.id} class={msg.bubbleClass}>
                            <div class={msg.bubbleInnerClass}>
                                <p class="slds-text-body_regular">{msg.body}</p>
                                <p class="msg-meta">
                                    {msg.authorName} &bull; {msg.formattedDate}
                                </p>
                            </div>
                        </div>
                    </template>
                </template>
                <template if:false={hasMessages}>
                    <p class="slds-text-align_center slds-text-color_weak slds-p-around_medium">
                        No messages yet.
                    </p>
                </template>
            </template>
        </div>

        <!-- Reply composer -->
        <div class="slds-card__footer">
            <c-message-composer
                case-id={caseId}
                platform={platform}
                onsent={handleMessageSent}>
            </c-message-composer>
        </div>
    </div>
</template>
